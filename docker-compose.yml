
services:
  postgres:
    image: postgres:16.8-alpine3.20
    container_name: postgres-db
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: puma_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  puma-docker:
    image: puma-backend
    container_name: puma-docker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data: